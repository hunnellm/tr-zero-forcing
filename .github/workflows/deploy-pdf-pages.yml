name: Build and deploy PDF to GitHub Pages (gh-pages)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build PDF (LaTeX)
        uses: xu-cheng/latex-action@v2
        with:
          root_file: main.tex

      - name: Prepare site directory
        run: |
          mkdir -p site
          cp main.pdf site/
          printf "%s" "<meta http-equiv='refresh' content='0; url=main.pdf' />" > site/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
